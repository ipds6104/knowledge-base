name: Sync Milestones to Google Sheets

on:
  schedule:
    # Berjalan setiap hari pada pukul 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan eksekusi manual via dashboard GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-auth-oauthlib google-api-python-client

    - name: Write Credentials and Token Files
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: |
        # Buat credentials.json dari GitHub Secrets
        echo "$GOOGLE_CREDENTIALS" > credentials.json
        # Buat token.json dari GitHub Secrets
        echo "$GOOGLE_TOKEN" > token.json
        
        # Tambahkan SPREADSHEET_ID ke .env jika belum terbuat di runner
        echo "SPREADSHEET_ID=\"$SPREADSHEET_ID\"" > .env

    - name: Execute Sync
      run: |
        python scripts/kb.py sync-sheets
